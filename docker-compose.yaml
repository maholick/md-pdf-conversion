services:
  # Frontend Next.js application
  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HOME=/tmp
    volumes:
      - workspace:/app/workspace
      - ./generated-pdfs:/app/generated-pdfs
      - ./templates:/templates:ro
    networks:
      - pdf-converter-network
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=512m

  # Development frontend with hot reload
  frontend-dev:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - HOME=/tmp
    volumes:
      - ./frontend:/app
      - workspace:/app/workspace
      - ./generated-pdfs:/app/generated-pdfs
      - ./templates:/templates:ro
    networks:
      - pdf-converter-network
    profiles:
      - dev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=512m

volumes:
  workspace:
    driver: local

networks:
  pdf-converter-network:
    driver: bridge
